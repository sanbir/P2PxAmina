[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }, { access = "read-write", path = "/shared" }]

verbosity = 3

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
number_underscore = "remove"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }

[invariant]
runs = 64
depth = 32
fail_on_revert = false
